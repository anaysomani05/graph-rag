# Local dev on this machine actually runs Postgres 18 + pgvector via Homebrew
# (no Docker available in this environment). This file is kept for anyone who
# clones the repo with Docker available, or for containerized deployment.
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: graphrag
      POSTGRES_PASSWORD: graphrag
      POSTGRES_DB: graphrag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
